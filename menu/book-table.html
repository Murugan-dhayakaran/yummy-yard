<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Table | Yummy Yard</title>
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/pages/book-table.css">
</head>
<body>

    <div class="main-card position-relative">
        <div class="header-section">
            <h4 class="fw-bold mb-0">Select table</h4>
            
            <div class="legend">
                <div class="legend-item"><div class="dot blue"></div> Available table</div>
                <div class="legend-item"><div class="dot red"></div> Reserved table</div>
                <div class="legend-item"><div class="dot green"></div> Occupied table</div>
            </div>

            <div class="search-controls flex-grow-1 d-flex justify-content-end">
                <select class="form-select" style="width: 140px;">
                    <option>All table</option>
                </select>
                <input type="text" class="form-control" placeholder="Search" style="width: 220px;">
            </div>
        </div>

        <div class="floor-plan">
            <!-- Row A -->
            <div class="table-row">
                <div class="tables-group">
                    <div class="table-container available">
                        <div class="chair top"></div><div class="chair bottom"></div><div class="chair left"></div><div class="chair right"></div>
                        <div class="table-box"><div class="table-circle">T-01</div></div>
                    </div>
                    <div class="table-container occupied">
                        <div class="chair top"></div><div class="chair bottom"></div><div class="chair left"></div><div class="chair right"></div>
                        <div class="table-box"><div class="table-circle">T-02</div></div>
                    </div>
                    <div class="table-container available large">
                        <div class="chair top"></div><div class="chair bottom"></div><div class="chair left"></div><div class="chair right"></div>
                        <div class="table-box large"><div class="table-circle">T-03</div></div>
                    </div>
                    <div class="table-container available">
                        <div class="chair top"></div><div class="chair bottom"></div><div class="chair left"></div><div class="chair right"></div>
                        <div class="table-box"><div class="table-circle">T-04</div></div>
                    </div>
                    <div class="table-container occupied">
                        <div class="chair top"></div><div class="chair bottom"></div><div class="chair left"></div><div class="chair right"></div>
                        <div class="table-box"><div class="table-circle">T-05</div></div>
                    </div>
                </div>
                <div class="row-label-card">A</div>
            </div>

            <!-- Row B -->
            <div class="table-row">
                <div class="tables-group">
                    <div class="table-container available">
                        <div class="chair top"></div><div class="chair bottom"></div><div class="chair left"></div><div class="chair right"></div>
                        <div class="table-box"><div class="table-circle">T-06</div></div>
                    </div>
                    <div class="table-container occupied">
                        <div class="chair top"></div><div class="chair bottom"></div><div class="chair left"></div><div class="chair right"></div>
                        <div class="table-box"><div class="table-circle">T-07</div></div>
                    </div>
                    <div class="table-container reserved large">
                        <div class="chair top"></div><div class="chair bottom"></div><div class="chair left"></div><div class="chair right"></div>
                        <div class="table-box large"><div class="table-circle">T-08</div></div>
                    </div>
                    <div class="table-container available">
                        <div class="chair top"></div><div class="chair bottom"></div><div class="chair left"></div><div class="chair right"></div>
                        <div class="table-box"><div class="table-circle">T-09</div></div>
                    </div>
                    <div class="table-container reserved">
                        <div class="chair top"></div><div class="chair bottom"></div><div class="chair left"></div><div class="chair right"></div>
                        <div class="table-box"><div class="table-circle">T-10</div></div>
                    </div>
                </div>
                <div class="row-label-card">B</div>
            </div>

            <!-- Row C -->
            <div class="table-row">
                <div class="tables-group">
                    <div class="table-container reserved">
                        <div class="chair top"></div><div class="chair bottom"></div><div class="chair left"></div><div class="chair right"></div>
                        <div class="table-box"><div class="table-circle">T-11</div></div>
                    </div>
                    <div class="table-container reserved">
                        <div class="chair top"></div><div class="chair bottom"></div><div class="chair left"></div><div class="chair right"></div>
                        <div class="table-box"><div class="table-circle">T-12</div></div>
                    </div>
                    <div class="table-container available large">
                        <div class="chair top"></div><div class="chair bottom"></div><div class="chair left"></div><div class="chair right"></div>
                        <div class="table-box large"><div class="table-circle">T-13</div></div>
                    </div>
                    <div class="table-container occupied">
                        <div class="chair top"></div><div class="chair bottom"></div><div class="chair left"></div><div class="chair right"></div>
                        <div class="table-box"><div class="table-circle">T-14</div></div>
                    </div>
                    <div class="table-container available">
                        <div class="chair top"></div><div class="chair bottom"></div><div class="chair left"></div><div class="chair right"></div>
                        <div class="table-box"><div class="table-circle">T-15</div></div>
                </div>
                <div class="row-label-card">C</div>
            </div>
        </div>
    </div>

</body>
</html>
