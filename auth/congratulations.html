<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Congratulations | Yummy Yard</title>
    <!-- Montserrat Font -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Page Specific CSS -->
    <link rel="stylesheet" href="../css/pages/congratulations.css">
</head>
<body>
    <div class="congrats-container">
        <!-- Left Side: Image -->
        <div class="congrats-image-section">
            <div class="image-wrapper" style="background-image: url('../../assets/images/Congratulations.png');"></div>
        </div>

        <!-- Right Side: Success Message -->
        <div class="congrats-form-section">
            <div class="congrats-card">
                <div class="success-illustration">
                    <img src="../assets/images/completed.png" alt="Success" class="completed-img">
                </div>

                <div class="form-header">
                    <h2>Congratulations</h2>
                    <p>Your account is ready to use</p>
                </div>

                <button type="button" class="home-btn" onclick="window.location.href='../dashboard/main-dashboard.html'">Go to Home</button>
            </div>
        </div>
    </div>
</body>
</html>
