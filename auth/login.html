<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Yummy Yard</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/pages/login.css?v=2">
</head>

<body>
    <div class="login-wrapper">
        <!-- Left Side: Illustration -->
        <div class="illustration-section">
            <img src="../assets/images/login_chef.png" alt="Welcome to Yummy Yard" class="illustration-img">
        </div>

        <!-- Right Side: Login Form -->
        <div class="form-section">
            <div class="brand-header">
                <img src="../assets/images/LOGO.png" alt="Logo" class="logo-icon">
                <span class="brand-name">Yummy <span class="yard-text">Yard</span></span>
            </div>

            <div class="login-form-container">
                <div class="welcome-text">
                    <h1>Welcome back!</h1>
                    <p>We're glad to see you again. Log in to access your account and explore our latest features.</p>
                </div>

                <form id="loginForm" action="../dashboard/main-dashboard.html">
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="input-field" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="input-field" placeholder="Enter your password" required>
                        <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
                    </div>

                    <button type="submit" class="login-button">Login</button>
                </form>

                <p class="footer-text">
                    Don't have an account? <a href="create-account.html">Create account</a>
                </p>
            </div>
        </div>
    </div>
</body>

</html>
