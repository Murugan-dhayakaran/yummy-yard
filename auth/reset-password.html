<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Yummy Yard</title>
    <!-- Montserrat Font -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Page Specific CSS -->
    <link rel="stylesheet" href="../css/pages/reset-password.css">
</head>
<body>
    <div class="reset-container">
        <!-- Left Side: Image -->
        <div class="reset-image-section">
            <div class="image-wrapper" style="background-image: url('../../assets/images/newpassword.png');"></div>
        </div>

        <!-- Right Side: Reset Password Form -->
        <div class="reset-form-section">
            <div class="reset-card">
                <div class="logo-container">
                    <img src="../assets/images/LOGO.png" alt="Yummy Yard Logo" class="circular-logo">
                </div>

                <div class="form-header">
                    <h2>Enter New Password</h2>
                    <p>Please enter your new password</p>
                </div>

                <form id="resetPasswordForm" action="congratulations.html">
                    <div class="input-group">
                        <div class="input-wrapper">
                            <span class="input-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                            </span>
                            <input type="password" id="password" placeholder="Password" required>
                            <span class="password-toggle">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            </span>
                        </div>
                    </div>

                    <div class="input-group">
                        <div class="input-wrapper">
                            <span class="input-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                            </span>
                            <input type="password" id="confirm-password" placeholder="Confirm Password" required>
                            <span class="password-toggle">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            </span>
                        </div>
                    </div>

                    <button type="submit" class="reset-btn">Confirm</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
