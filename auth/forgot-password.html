<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forget Password | Yummy Yard</title>
    <!-- Montserrat Font -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Page Specific CSS -->
    <link rel="stylesheet" href="../css/pages/forgot-password.css">
</head>
<body>
    <div class="forgot-container">
        <!-- Left Side: Image -->
        <div class="forgot-image-section">
            <div class="image-wrapper"></div>
        </div>

        <!-- Right Side: Forgot Password Form -->
        <div class="forgot-form-section">
            <div id="step1" class="forgot-card">
                <div class="logo-container">
                    <img src="../assets/images/LOGO.png" alt="Yummy Yard Logo" class="circular-logo">
                </div>

                <div class="form-header">
                    <h2>Forget Password</h2>
                    <p>Select which contact details should we use to reset your password</p>
                </div>

                <form id="forgotPasswordForm" action="otp-verification.html">
                    <div class="input-group">
                        <div class="input-wrapper">
                            <span class="input-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                            </span>
                            <input type="email" id="email" placeholder="Email" required>
                        </div>
                    </div>

                    <button type="submit" class="reset-btn">Get OTP</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
